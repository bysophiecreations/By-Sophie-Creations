<script>

const creations = [

    {photo:"A1.jpg", description:"Jeu du morpion", prix:"6 €"},
    {photo:"A2.jpg", description:"Tête de mort", prix:"5 €"},
 {photo:"A3.jpg", description:"Peigne océan", prix:"5 €"},
    {photo:"A4.jpg", description:"Peigne nature", prix:"5 €"},
 {photo:"A5.jpg", description:"Marque page avec inscription", prix:"5 €"},


];

// Mélange les créations
creations.sort(() => Math.random() - 0.5);
const galerie = document.getElementById("galerie");



creations.forEach(c => {

    galerie.innerHTML += `
        <div class="creation">
            <img src="images/${c.photo}" alt="${c.description}">
            <p class="description">${c.description}</p>
            <p class="prix">${c.prix}</p>

          <button class="btn-panier"
onclick="ajouterAuPanier('${c.description}','${c.prix}','${c.photo}')">
    Ajouter au panier
</button>
        </div>
    `;

});

function ajouterAuPanier(description, prix, photo) {

    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({
        description: description,
        prix: prix,
        photo: photo
    });

   localStorage.setItem("panier", JSON.stringify(panier));

mettreAJourPanier();

alert("Article ajouté au panier !");
}



</script>
<script>

<script>
document.onkeydown = function(e){
    if (e.keyCode == 123) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
        return false;
    }

    if (e.ctrlKey && e.keyCode == 85) {
        return false;
    }
}
</script>
<script>

e.preventDefault();
});

</script>

<script>
function mettreAJourPanier() {

    const panier = JSON.parse(localStorage.getItem("panier")) || [];
    const badge = document.getElementById("nbArticles");

    if (panier.length > 0) {
        badge.textContent = panier.length;
        badge.style.display = "flex";
    } else {
        badge.style.display = "none";
    }
}

mettreAJourPanier();
</script>
