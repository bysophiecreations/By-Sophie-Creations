<script>

const panier = JSON.parse(localStorage.getItem("panier")) || [];

let listeArticles = "";
let sousTotal = 0;

const fraisEnvoi = 5;

const recap = document.getElementById("recap-panier");

if (panier.length === 0) {

    recap.innerHTML = "<p>Votre panier est vide.</p>";

} else {

    panier.forEach(article => {

        recap.innerHTML += `
            <div class="creation">
                <img src="images/${article.photo}" style="max-width:150px;border-radius:10px;">
                <p>${article.description}</p>
                <p class="prix">${article.prix}</p>
            </div>
        `;

     listeArticles += `
<div style="margin-bottom:20px;">
    <img src="https://bysophiecreations.github.io/By-Sophie-Creations/images/${article.photo}"
         width="120"
         style="border-radius:8px;"><br>

    <strong>${article.description}</strong><br>
    Prix : ${article.prix}
</div>
`;

        sousTotal += parseFloat(
            article.prix.replace("€", "").replace(",", ".")
        );
    });

    const total = sousTotal + fraisEnvoi;
recap.innerHTML += `
    <hr>
    <p><strong>Sous-total :</strong> ${sousTotal.toFixed(2)} €</p>
    <p><strong>Frais d'envoi :</strong> ${fraisEnvoi.toFixed(2)} €</p>
    <p style="font-size:1.2em;">
        <strong>Total :</strong> ${total.toFixed(2)} €
    </p>
`;
 

    document.getElementById("articlesCommande").value =
        listeArticles +
        "\nSous-total : " + sousTotal.toFixed(2) + " €" +
        "\nFrais d'envoi : " + fraisEnvoi.toFixed(2) + " €" +
        "\nTotal : " + total.toFixed(2) + " €";
document.querySelector('input[name="Email"]').addEventListener("input", function () {
    document.getElementById("replyto").value = this.value;
});
}
</script>

<script>
document.onkeydown = function(e){
    if (e.keyCode == 123) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
        return false;
    }

    if (e.ctrlKey && e.keyCode == 85) {
        return false;
    }
}
</script>

<script>
const formulaire = document.getElementById("commandeForm");

formulaire.addEventListener("submit", async function(e) {

    e.preventDefault();

    const formData = new FormData(formulaire);

    try {

        const response = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: formData
        });

        const resultat = await response.json();

        if (resultat.success) {

            // Vide le panier
            localStorage.removeItem("panier");

            // Redirection
            window.location.href = "merci.html";

        } else {

            alert("Une erreur est survenue lors de l'envoi de votre commande.");

        }

    } catch (erreur) {

        alert("Impossible d'envoyer la commande. Vérifiez votre connexion Internet.");

    }

});
</script>
