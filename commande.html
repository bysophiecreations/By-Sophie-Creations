<script>

const panier = JSON.parse(localStorage.getItem("panier")) || [];

let listeArticles = "";
let sousTotal = 0;

const fraisEnvoi = 5;

const recap = document.getElementById("recap-panier");

if (panier.length === 0) {

    recap.innerHTML = "<p>Votre panier est vide.</p>";

} else {

    panier.forEach(article => {

        recap.innerHTML += `
            <div class="creation">
                <img src="images/${article.photo}" style="max-width:150px;border-radius:10px;">
                <p>${article.description}</p>
                <p class="prix">${article.prix}</p>
            </div>
        `;

        listeArticles += article.description + " - " + article.prix + "\n";

        sousTotal += parseFloat(
            article.prix.replace("€", "").replace(",", ".")
        );
    });

    const total = sousTotal + fraisEnvoi;

  recap.innerHTML += `
    <div class="creation">
        <img src="images/${article.photo}" 
             alt="${article.description}"
             style="max-width:150px; border-radius:10px;">

        <p class="description">${article.description}</p>

        <p class="prix">${article.prix}</p>
    </div>
`;

    document.getElementById("articlesCommande").value =
        listeArticles +
        "\nSous-total : " + sousTotal.toFixed(2) + " €" +
        "\nFrais d'envoi : " + fraisEnvoi.toFixed(2) + " €" +
        "\nTotal : " + total.toFixed(2) + " €";
}
</script>

}
