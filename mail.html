<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Envoyer un message - By Sophie Créations</title>

    <meta name="description" content="Contactez By Sophie Créations grâce à notre formulaire de contact.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <img src="logo.jpg" alt="By Sophie Créations" class="logo-header">

    <h1>Envoyer un message</h1>

    <p>Remplissez le formulaire ci-dessous, je vous répondrai dans les meilleurs délais.</p>

    <form id="contactForm" action="https://api.web3forms.com/submit" method="POST" accept-charset="UTF-8">

        <!-- Configuration Web3Forms -->
<input type="hidden" name="access_key" value="4485a489-3fec-4f53-b05a-0da03957a04b">

<input type="hidden" name="subject" value="Nouveau message depuis le site By Sophie Créations">

<input type="hidden" name="from_name" value="By Sophie Créations">

<input type="hidden" name="botcheck" style="display:none">

<input type="hidden" name="replyto" id="replyto">

        <label for="nom">Nom</label>
        <input type="text" id="nom" name="Nom" required>

        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="Prénom" required>

        <label for="email">Votre adresse e-mail</label>
        <input type="email" id="email" name="Email" required>

        <label for="motif">Motif</label>
        <select id="motif" name="Motif" required>
            <option value="">-- Choisissez un motif --</option>
            <option>Commande</option>
            <option>Demande d'information</option>
            <option>Réclamation</option>
            <option>Partenariat</option>
            <option>Autre</option>
        </select>

        <label for="message">Votre message</label>
        <textarea id="message" name="Message" rows="8" required></textarea>

        <br>

        <button type="submit" class="btn">
            📩 Envoyer le message
        </button>

    </form>

    <br>

    <a href="contact.html" class="btn retour">
        ← Retour à la page Contact
    </a>

</section>

<footer>

<hr>

</p>

</footer>

<script>
// Désactive le clic droit
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

// Désactive certaines touches développeur
document.onkeydown = function(e){
    if(e.keyCode==123) return false;
    if(e.ctrlKey && e.shiftKey && (e.keyCode==73 || e.keyCode==74)) return false;
    if(e.ctrlKey && e.keyCode==85) return false;
};

// Empêche le glisser-déposer des images
document.querySelectorAll("img").forEach(img=>{
    img.setAttribute("draggable","false");
    img.addEventListener("dragstart",e=>e.preventDefault());
});
</script>
<script>
// Permet de répondre directement au client
document.getElementById("email").addEventListener("input", function () {
    document.getElementById("replyto").value = this.value;
});

// Envoi du formulaire
const contactForm = document.getElementById("contactForm");

contactForm.addEventListener("submit", async function(e){

    e.preventDefault();

    const bouton = contactForm.querySelector("button");

    bouton.disabled = true;
    bouton.textContent = "Envoi en cours...";

    const formData = new FormData(contactForm);

    try{

        const response = await fetch("https://api.web3forms.com/submit",{
            method:"POST",
            body:formData
        });

        const result = await response.json();

        if(result.success){

            window.location.href="merci.html";

        }else{

            alert("Une erreur est survenue lors de l'envoi du message.");

            bouton.disabled = false;
            bouton.textContent = "📩 Envoyer le message";
        }

    }catch(error){

        alert("Impossible d'envoyer le message.");

        bouton.disabled = false;
        bouton.textContent = "📩 Envoyer le message";
    }

});
</script>
</body>
</html>
