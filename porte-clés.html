<script>

const creations = [

    {photo:"PC1.jpg", description:"Diamant rouge", prix:"3 €"},
    {photo:"PC2.jpg", description:"Coquillages sur le sable", prix:"5 €"},
    {photo:"PC3.jpg", description:"Diamant blanc", prix:"3 €"},

    {photo:"PC5.jpg", description:"Coquillage sur le sable", prix:"4 €"},
    {photo:"PC6.jpg", description:"Porte-clé prénom", prix:"5 €"},
    {photo:"PC7.jpg", description:"Papillon", prix:"3 € l'unité"},
    {photo:"PC8.jpg", description:"Porte-clé personnalisable", prix:"5,50 €"},
    {photo:"PC9.jpg", description:"Ourson bleu pailleté", prix:"3 €"},
    {photo:"PC10.jpg", description:"Ourson transparent", prix:"3 €"},
    {photo:"PC11.jpg", description:"Ourson transparent avec un noeud", prix:"3 €"},
    {photo:"PC12.jpg", description:"Oval de cristal avec un coeur émeraude", prix:"2 €"},
    {photo:"PC13.jpg", description:"Ourson vert kaki pailleté", prix:"3 €"},
    {photo:"PC14.jpg", description:"Ourson rouge", prix:"3 €"},
    {photo:"PC15.jpg", description:"Ourson vert", prix:"3 €"},
    {photo:"PC16.jpg", description:"Etoile de mer sur le sable", prix:"3 €"},
{photo:"PC17.jpg", description:"Coeur avec inscription LOVE dans un cercle transparent", prix:"3 €"},
{photo:"PC19.jpg", description:"Cercle jaune ornée d'un lion", prix:"4 €"},
{photo:"PC20.jpg", description:"Cercle jaune avec ruche et abeille", prix:"4 €"},
{photo:"PC21.jpg", description:"Tortue blanche sur la plage", prix:"3 €"},
{photo:"PC22.jpg", description:"Levé de soleil sur un palmier", prix:"4 €"},
{photo:"PC23.jpg", description:"Oval transparent avec arbre de vie blanc et inscription La vie est belle", prix:"4 €"},
{photo:"PC24.jpg", description:"Oval jaune incrusté d'un mignon petit renard", prix:"4 €"},
{photo:"PC25.jpg", description:"Oval jaune incrusté d'une fée et d'étoiles", prix:"3 €"},


];
// Mélange les créations
creations.sort(() => Math.random() - 0.5);
const galerie = document.getElementById("galerie");




creations.forEach(c => {

    galerie.innerHTML += `
        <div class="creation">
            <img src="images/${c.photo}" alt="${c.description}">
            <p class="description">${c.description}</p>
            <p class="prix">${c.prix}</p>

           <button class="btn-panier"
onclick="ajouterAuPanier('${c.description}','${c.prix}','${c.photo}')">
    Ajouter au panier
</button>
        </div>
    `;

});

function ajouterAuPanier(description, prix, photo) {

    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({
        description: description,
        prix: prix,
        photo: photo
    });

    localStorage.setItem("panier", JSON.stringify(panier));

    mettreAJourPanier();

    alert("Article ajouté au panier !");
}
</script>

<script>
document.onkeydown = function(e){
    if (e.keyCode == 123) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
        return false;
    }

    if (e.ctrlKey && e.keyCode == 85) {
        return false;
    }
}
</script>

<script>
function mettreAJourPanier() {

    const panier = JSON.parse(localStorage.getItem("panier")) || [];
    const badge = document.getElementById("nbArticles");

    if (panier.length > 0) {
        badge.textContent = panier.length;
        badge.style.display = "flex";
    } else {
        badge.style.display = "none";
    }
}

mettreAJourPanier();
</script>
