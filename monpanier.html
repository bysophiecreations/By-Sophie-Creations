    <h1>Mon panier</h1>

    <div id="panier"></div>

    <button onclick="viderPanier()" class="btn">
        Vider le panier
    </button>

    <br><br>

   <button onclick="location.href='commande.html'" class="btn">
    Passer commande
</button>

<br><br>

    <a href="creations.html" class="btn retour">
        Continuer mes achats
    </a>
   

</section>

<script>

const panier = JSON.parse(localStorage.getItem("panier")) || [];

const zonePanier = document.getElementById("panier");

if (panier.length === 0) {

    zonePanier.innerHTML = "<p>Votre panier est vide.</p>";

} else {

    panier.forEach(article => {

        zonePanier.innerHTML += `
            <div class="creation">
                <img src="images/${article.photo}" alt="${article.description}">
                <p>${article.description}</p>
                <p class="prix">${article.prix}</p>
            </div>
        `;

    });

}
function passerCommande() {

    const panier = JSON.parse(localStorage.getItem("panier")) || [];

    if (panier.length === 0) {
        alert("Votre panier est vide.");
        return;
    }

    let commande = "Bonjour,%0D%0A%0D%0AJe souhaite commander :%0D%0A%0D%0A";

    panier.forEach(article => {
        commande += "- " + article.description + " (" + article.prix + ")%0D%0A";
    });

    window.location.href =
        "mailto:bysophiecreations@gmail.com?subject=Commande By Sophie Créations&body=" + commande;
}
function viderPanier() {
    localStorage.removeItem("panier");
    location.reload();
}

</script>

<script>
document.onkeydown = function(e){
    if (e.keyCode == 123) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
        return false;
    }

    if (e.ctrlKey && e.keyCode == 85) {
        return false;
    }
}
</script>

<script>
function mettreAJourPanier() {

    const panier = JSON.parse(localStorage.getItem("panier")) || [];
    const compteur = document.getElementById("nbArticles");

    if (panier.length > 0) {
        compteur.textContent = panier.length;
        compteur.style.display = "inline";
    } else {
        compteur.style.display = "none";
    }
}

mettreAJourPanier();
