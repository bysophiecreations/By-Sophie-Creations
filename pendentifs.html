]
creations.sort(() => Math.random() - 0.5);

const galerie = document.getElementById("galerie");



creations.forEach(c => {


galerie.innerHTML += `
    <div class="creation" id="${c.id || ''}">
        <img src="images/${c.photo}" alt="${c.description}">
        <p class="description">${c.description}</p>
        <p class="prix">${c.prix}</p>

        <button class="btn-panier"
            onclick="ajouterAuPanier('${c.description}','${c.prix}','${c.photo}')">
            Ajouter au panier
        </button>
    </div>
`;
});


function afficherNotification(){

    const notif = document.getElementById("notificationPanier");

    if (!notif) return;

    notif.classList.add("afficher");

    setTimeout(function(){
        notif.classList.remove("afficher");
    },2000);

}


function ajouterAuPanier(description, prix, photo) {

    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({
        description: description,
        prix: prix,
        photo: photo
    });

    localStorage.setItem("panier", JSON.stringify(panier));

    mettreAJourPanier();

    afficherNotification();
}

</script>
<script>

<script>
document.addEventListener("keydown", function(e){
    if (e.key === "F12") e.preventDefault();

    if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.key === "U") {
        e.preventDefault();
    }
});

</script>
<script>

document.querySelectorAll("img").forEach(img => {

img.setAttribute("draggable","false");

img.addEventListener("dragstart", function(e){
e.preventDefault();
});

});

</script>

<script>
function mettreAJourPanier() {

    const panier = JSON.parse(localStorage.getItem("panier")) || [];
    const badge = document.getElementById("nbArticles");

    if (panier.length > 0) {
        badge.textContent = panier.length;
        badge.style.display = "flex";
    } else {
        badge.style.display = "none";
    }
}

mettreAJourPanier();
</script>
