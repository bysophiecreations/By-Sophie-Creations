const galerie = document.getElementById("galerie");



creations.forEach(c => {


galerie.innerHTML += `
    <div class="creation" id="${c.id || ''}">
        <img src="images/${c.photo}" alt="${c.description}">
        <p class="description">${c.description}</p>
        <p class="prix">${c.prix}</p>

        <button class="btn-panier"
            onclick="ajouterAuPanier('${c.description}','${c.prix}','${c.photo}')">
            Ajouter au panier
        </button>
    </div>
`;
});


function ajouterAuPanier(description, prix, photo) {

  let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({
        description: description,
        prix: prix,
        photo: photo
    });

    localStorage.setItem("panier", JSON.stringify(panier));

    mettreAJourPanier();

    alert("Article ajouté au panier !");
}

<script>

<script>
document.addEventListener("keydown", function(e){
    if (e.key === "F12") e.preventDefault();

    if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.key === "U") {
        e.preventDefault();
    }
});

</script>

});

});
