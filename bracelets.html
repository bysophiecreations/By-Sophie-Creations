<script>

const creations = [

    {photo:"B1.jpg", description:"Bracelet forme de fleur orange", prix:"5 €"},
    {photo:"B2.jpg", description:"Coeur rouge pailleté dans son encadrement métallique", prix:"6 €"},
    {photo:"B3.jpg", description:"Cercle jaune avec un soleil noir", prix:"4 €"},
   {photo:"Parure1.jpg", description:"Parure complète couleur vert et or", prix:"20 €"},
    {photo:"Parure2.jpg", description:"Parure complète en forme de larme marron clair assortie de coquillages", prix:"15 €"},
{photo:"B4.jpg", description:"Coeur jaune pailleté", prix:"2 €"},
{photo:"Parure3.jpg", description:"Parure boucles et bracelet de fleur bleue des iles", prix:"6 €"},
 {photo:"B5.jpg", description:"Perles en résine turquoise et fleurs dorées", prix:"6 €"},
 
  
];
  // Mélange les créations
creations.sort(() => Math.random() - 0.5);
const galerie = document.getElementById("galerie");

creations.forEach(c => {

    galerie.innerHTML += `
        <div class="creation">
            <img src="images/${c.photo}" alt="${c.description}">
            <p class="description">${c.description}</p>
            <p class="prix">${c.prix}</p>

            <button class="btn-panier"
                onclick="ajouterAuPanier('${c.description}','${c.prix}','${c.photo}')">
                Ajouter au panier
            </button>
        </div>
    `;

});

function ajouterAuPanier(description, prix, photo) {

    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({
        description: description,
        prix: prix,
        photo: photo
    });

    localStorage.setItem("panier", JSON.stringify(panier));

    mettreAJourPanier();

    alert("Article ajouté au panier !");
}

</script>

<script>
document.onkeydown = function(e){
    if (e.keyCode == 123) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
        return false;
    }

    if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
        return false;
    }

    if (e.ctrlKey && e.keyCode == 85) {
        return false;
    }
}
</script>
